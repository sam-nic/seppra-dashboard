name: Update Planfix Cache

on:
  schedule:
    - cron: '0 6 * * *'   # каждый день в 06:00 UTC (09:00 МСК)
  workflow_dispatch:        # ручной запуск из GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch data from Planfix
        env:
          PLANFIX_TOKEN: ${{ secrets.SEPPRA_PLANFIX_TOKEN }}
        run: python scripts/fetch_data.py

      - name: Commit and push cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache.json
          git diff --cached --quiet || git commit -m "chore: update Planfix cache $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
