<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Дашборд компании «Сеппра»</title>
<script src="lib/supabase.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }

header { background: #2E2D7C; color: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
.hdr-brand { display: flex; align-items: center; gap: 14px; }
.hdr-brand h1 { font-size: 16px; font-weight: 600; letter-spacing: .02em; }
.hdr-user { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,.85); font-size: 12px; }
.hdr-user button { background: none; border: 1px solid rgba(255,255,255,.35); color: rgba(255,255,255,.85); border-radius: 5px; padding: 4px 6px; cursor: pointer; display: flex; align-items: center; }
.hdr-user button:hover { background: rgba(255,255,255,.12); }

.content { max-width: 1100px; margin: 0 auto; padding: 28px 24px; }
.content h2 { font-size: 15px; font-weight: 600; color: #555; margin-bottom: 18px; }

.widgets { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 18px; }
.widget { background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 20px 22px; text-decoration: none; color: inherit; display: block; transition: box-shadow .15s, transform .15s; }
a.widget:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); transform: translateY(-2px); }
.widget-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.widget-icon { width: 38px; height: 38px; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.widget-icon.green { background: #e3f1e8; color: #1a6b3c; }
.widget-title { font-size: 14px; font-weight: 600; color: #222; }
.widget-sub { font-size: 11px; color: #999; margin-top: 2px; }
.widget-stats { display: flex; gap: 18px; }
.ws { min-width: 60px; }
.ws-val { font-size: 22px; font-weight: 700; color: #1a6b3c; }
.ws-lbl { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: .04em; margin-top: 2px; }
.widget-empty { color: #bbb; font-size: 12px; }
.widget.soon { opacity: .55; border: 2px dashed #ddd; box-shadow: none; background: transparent; display: flex; align-items: center; justify-content: center; min-height: 130px; color: #999; font-size: 13px; }

/* Auth */
.auth-overlay { position: fixed; inset: 0; background: #f0f2f5; z-index: 1000; display: flex; align-items: center; justify-content: center; }
.auth-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,.1); padding: 36px 40px; width: 360px; text-align: center; }
.auth-card .auth-brand { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 6px; }
.auth-card h2 { font-size: 15px; font-weight: 600; color: #2E2D7C; letter-spacing: .02em; }
.auth-card .auth-sub { font-size: 12px; color: #888; margin: 10px 0 22px; line-height: 1.5; }
.auth-card input[type=email] { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 7px; font-size: 14px; margin-bottom: 12px; outline: none; }
.auth-card input[type=email]:focus { border-color: #2E2D7C; }
.auth-card button { width: 100%; padding: 10px; background: #2E2D7C; color: #fff; border: none; border-radius: 7px; font-size: 14px; font-weight: 600; cursor: pointer; }
.auth-card button:hover { background: #232265; }
.auth-card button:disabled { opacity: .5; cursor: default; }
.auth-msg { font-size: 12px; margin-top: 14px; line-height: 1.5; display: none; }
.auth-msg.ok { color: #1a6b3c; display: block; }
.auth-msg.fail { color: #c0392b; display: block; }
</style>
</head>
<body>

    </div>
    <div class="auth-sub">Единый вход в отчёты компании.<br>Доступ — только для сотрудников с корпоративным адресом <b>@seppra.ru</b></div>

<div class="content">
  <h2>Отчёты</h2>
  <div class="widgets">
    <a class="widget" href="call-center-kpi/">
      <div class="widget-head">
        <div class="widget-icon green">
          <svg width="20" height="22" viewBox="0 0 24 26" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 17v-5a9 9 0 0 1 18 0v5"/>

            <path d="M3 18a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/>
            <path d="M7 20 Q7 25 12 25"/>
            <circle cx="12" cy="25" r="1.2" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div>
          <div class="widget-title">Отчёт колл-центра</div>
          <div class="widget-sub" id="ccSub">текущий месяц</div>
        </div>
      </div>
      <div class="widget-stats" id="ccStats">
        <span class="widget-empty">Загрузка…</span>
      </div>
    </a>
    <div class="widget soon">+ следующий отчёт скоро</div>
  </div>
</div>

<script>
// ---------- AUTH (Supabase Magic Link) ----------
const SUPABASE_URL = 'https://beupssihwzxrreiwzfix.supabase.co';
const SUPABASE_KEY = 'sb_publishable_isRXLoIghPg9zfDZC8C1Ng_OZPcaPWU';
const ALLOWED_DOMAIN = '@seppra.ru';
const ALLOWED_EMAILS = new Set([
  'lesha.suschits@gmail.com',
]);
function isAllowedEmail(email) {
  const e = (email || '').toLowerCase();
  return e.endsWith(ALLOWED_DOMAIN) || ALLOWED_EMAILS.has(e);
}
// ВРЕМЕННО: вход без письма (обход лимита 2 письма/час встроенной почты Supabase)
const BYPASS_EMAILS = new Set([
  'lesha.suschits@gmail.com',
]);
const BYPASS_KEY = 'seppra_bypass_email';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function sendMagicLink() {
  const email = document.getElementById('authEmail').value.trim().toLowerCase();
  const msg = document.getElementById('authMsg');
  const btn = document.getElementById('authBtn');
  msg.className = 'auth-msg';
  if (!email || !email.includes('@')) {
    msg.textContent = 'Введите корректный email';
    msg.classList.add('fail');
    return;
  }
  if (!isAllowedEmail(email)) {
    msg.textContent = 'Доступ только для адресов ' + ALLOWED_DOMAIN;
    msg.classList.add('fail');
    return;
  }
  if (BYPASS_EMAILS.has(email)) {
    localStorage.setItem(BYPASS_KEY, email);
    showDashboard({ user: { email } });
    return;
  }
  btn.disabled = true;
  const { error } = await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href.split('#')[0] }
  });
  btn.disabled = false;
  if (error) {
    msg.textContent = 'Ошибка: ' + error.message;
    msg.classList.add('fail');
  } else {
    msg.textContent = 'Ссылка отправлена! Проверьте почту ' + email;
    msg.classList.add('ok');
  }
}

async function signOut() {
  localStorage.removeItem(BYPASS_KEY);
  await sb.auth.signOut();
  window.location.reload();
}

function showDashboard(session) {
  document.getElementById('authOverlay').style.display = 'none';
  const hu = document.getElementById('hdrUser');
  hu.style.display = 'flex';
  document.getElementById('userEmail').textContent = session.user.email;
  if (!window._hubStarted) {
    window._hubStarted = true;
    loadWidgets();
  }
}

async function initAuth() {
  const bypassEmail = localStorage.getItem(BYPASS_KEY);
  if (bypassEmail && BYPASS_EMAILS.has(bypassEmail)) {
    showDashboard({ user: { email: bypassEmail } });
    return;
  }
  const { data: { session } } = await sb.auth.getSession();
  if (session && isAllowedEmail(session.user.email)) {
    showDashboard(session);
  } else if (session) {
    await sb.auth.signOut();
  }
  sb.auth.onAuthStateChange((_event, session) => {
    if (session && isAllowedEmail(session.user.email)) {
      showDashboard(session);
    }
  });
}

// ---------- WIDGETS ----------
async function loadWidgets() {
  const stats = document.getElementById('ccStats');
  try {
    const r = await fetch('data/cache.json?t=' + Date.now());
    if (!r.ok) throw new Error('no cache');
    const data = await r.json();

    // Текущий месяц
    const now = new Date();
    const mFrom = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
    const mTo   = new Date(now.getFullYear(), now.getMonth() + 1, 1).getTime();
    const inMonth = iso => { if (!iso) return false; const t = new Date(iso).getTime(); return t >= mFrom && t < mTo; };

    // Считаем касания только по ЛИДам из выборки — как в отчёте
    const lidIds = new Set((data.lids || []).map(l => l.id));
    let calls = 0, lpr = 0;
    for (const k of (data.kasaniya || [])) {
      if (!lidIds.has(k.taskId)) continue;
      if (!inMonth(k.date)) continue;
      if (k.isCall) calls++;
      if (k.isLPR)  lpr++;
    }
    let reqs = 0;
    for (const id in (data.requests || {})) {
      if (inMonth(data.requests[id].created)) reqs++;
    }
    let targets = 0;
    for (const l of (data.lids || [])) {
      if (!l.qualDate) continue;
      const p = l.qualDate.split('-'); // DD-MM-YYYY
      if (p.length === 3 && inMonth(`${p[2]}-${p[1]}-${p[0]}T00:00:00`)) targets++;
    }

    const MO = ['январь','февраль','март','апрель','май','июнь','июль','август','сентябрь','октябрь','ноябрь','декабрь'];
    document.getElementById('ccSub').textContent = MO[now.getMonth()] + ' ' + now.getFullYear() + (data.updated ? ' · данные: ' + data.updated : '');

    stats.innerHTML = `
      <div class="ws"><div class="ws-val">${calls}</div><div class="ws-lbl">Дозвонов</div></div>
      <div class="ws"><div class="ws-val">${lpr}</div><div class="ws-lbl">до ЛПР</div></div>
      <div class="ws"><div class="ws-val">${targets}</div><div class="ws-lbl">Целевых</div></div>
      <div class="ws"><div class="ws-val">${reqs}</div><div class="ws-lbl">Запросов</div></div>
    `;
  } catch (e) {
    stats.innerHTML = '<span class="widget-empty">Данные появятся после первой синхронизации</span>';
  }
}

initAuth();
</script>
</body>
